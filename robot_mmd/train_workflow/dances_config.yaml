# 舞蹈登记：由 g1_mmd_playback.py 用 DEFAULT_DANCES_CONFIG_PATH 读取（默认本文件）。
# 各 motion / audio 路径相对于 robot_mmd/media/，motion 支持 .csv / .h5 / .hdf5
# 例如 dance/foo.csv 或 dance/foo.h5 即 media/dance/foo.csv / media/dance/foo.h5
# - key: 选填，单字符快捷键；省略则仅出现在 Mapping UI 下拉菜单（无热键）
# - motion: 必填
# - audio: 选填；省略或空则播放时不伴音
# - id: 选填，仅日志用
# 可选 sibling：同目录 ``<stem>_z_editted.csv|.h5``（Mapping UI 勾选 Z_offset_enable 时自动选用）
# 启动 playback 时会扫描 ``media/dance/*.vmd``，自动生成缺失的 CSV/H5 并追加无 key 的登记项

version: 1
dances:

  - id: gokurakujyodo
    motion: dance/gokurakujyodo.csv
    audio: dance/gokurakujyodo.wav

  - id: girls
    motion: dance/girls.csv
    audio: dance/girls.wav


  - id: deepbluetown
    key: I
    motion: dance/deepbluetown.csv
    audio: dance/deepbluetown.wav

  - id: you are important
    key: O
    motion: dance/you_are_important.csv
    audio: dance/you_are_important.wav

  - id: iris out
    key: U
    motion: dance/IRIS_OUT.csv
    audio: dance/IRIS_OUT.wav


  - id: galaxias
    motion: dance/galaxias.csv
    audio: dance/galaxias.wav

